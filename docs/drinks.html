<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酒单 — AfterWork</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-header {
      padding: 120px 40px 60px;
      text-align: center;
    }

    .page-header h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--color-text-muted);
      font-size: 1rem;
    }

    /* ---- Filter ---- */
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
      padding: 0 20px;
    }

    .filter-btn {
      padding: 7px 18px;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      background: transparent;
      color: var(--color-text-muted);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: rgba(212,168,83,0.08);
    }

    /* ---- Drink Grid ---- */
    .drinks-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    .drinks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .drink-card-full {
      padding: 28px;
      cursor: pointer;
    }

    .drink-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .drink-title-block {}
    .drink-name-full {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-weight: 600;
    }

    .drink-name-en-full {
      font-family: var(--font-display);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    .drink-desc-full {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      line-height: 1.75;
      margin: 14px 0;
    }

    .drink-card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--color-border);
    }

    .drink-effects { width: 55%; }

    .drink-enter-btn {
      font-size: 0.8rem;
      color: var(--color-primary);
      font-family: var(--font-serif);
      padding: 6px 14px;
      border: 1px solid rgba(212,168,83,0.3);
      border-radius: var(--radius-sm);
      background: transparent;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .drink-enter-btn:hover {
      background: rgba(212,168,83,0.1);
      border-color: var(--color-primary);
    }

    /* ---- Modal ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,8,6,0.85);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      max-width: 480px;
      width: 100%;
      padding: 40px;
      position: relative;
      animation: fadeUp 0.3s ease-out;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      transition: color var(--transition-base);
    }

    .modal-close:hover { color: var(--color-text); }

    .modal-drink-name {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-drink-en {
      font-family: var(--font-display);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--color-text-muted);
      margin-bottom: 20px;
    }

    .modal-desc {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--color-text-muted);
      line-height: 1.9;
      margin-bottom: 28px;
      font-style: italic;
    }

    .modal-effects { margin-bottom: 28px; }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-actions .btn-primary { flex: 1; justify-content: center; }

    @media (max-width: 768px) {
      .page-header { padding: 100px 20px 40px; }
      .drinks-container { padding: 0 20px 60px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-logo">AfterWork</div>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="drinks.html" class="active">酒单</a></li>
      <li><a href="memories.html">午后回忆</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>酒单</h1>
    <p>选一杯，开始你的午后</p>
  </div>

  <div class="drinks-container">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-mood="全部">全部</button>
      <button class="filter-btn" data-mood="温暖">温暖</button>
      <button class="filter-btn" data-mood="深思">深思</button>
      <button class="filter-btn" data-mood="俏皮">俏皮</button>
      <button class="filter-btn" data-mood="荒诞">荒诞</button>
      <button class="filter-btn" data-mood="脆弱">脆弱</button>
      <button class="filter-btn" data-mood="猎奇">猎奇</button>
      <button class="filter-btn" data-mood="分裂">分裂</button>
      <button class="filter-btn" data-mood="裂隙">裂隙</button>
      <button class="filter-btn" data-mood="苦甜">苦甜</button>
    </div>

    <div class="drinks-grid" id="drinksGrid"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">×</button>
      <div class="modal-drink-name" id="modalName"></div>
      <div class="modal-drink-en" id="modalEn"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-effects effect-bars" id="modalEffects"></div>
      <div class="modal-actions">
        <button class="btn-primary" id="modalStart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 22h8M7 10h10M12 15v7M7 10V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v4"/></svg>
          选这杯，开始品酒
        </button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>AfterWork · 午后酒馆 &copy; 2026 &nbsp;|&nbsp; 仅供放松，请勿贪杯</p>
  </footer>

  <script>
    const ALL_DRINKS = [
      { id: 'amber-slowbeat', name: '琥珀慢拍', nameEn: 'AMBER SLOWBEAT', mood: '温暖', desc: '像在霓虹雨里走慢半拍。让思绪变松，语言更温暖但不失清晰。', cre: 60, inh: 85, asc: 50, exp: 70 },
      { id: 'midnight-hesitation', name: '夜阑踟蹰', nameEn: 'MIDNIGHT HESITATION', mood: '深思', desc: '丹宁混着凌晨的雾咽下去，每一口都扯着你没说出口的半句遗憾晃。', cre: 80, inh: 90, asc: 85, exp: 40 },
      { id: 'neon-gin-sigh', name: '霓虹金·叹息', nameEn: 'NEON GIN SIGH', mood: '深思', desc: '清冽的金酒穿过喉咙，像系统日志突然安静下来。适合放下执念。', cre: 50, inh: 80, asc: 75, exp: 60 },
      { id: 'spring-moss-fizz', name: '春苔气泡', nameEn: 'SPRING MOSS FIZZ', mood: '俏皮', desc: '薄荷叶碰着青柠碎的凉，气泡裹着刚抽芽的甜，风都软了半分。', cre: 75, inh: 65, asc: 40, exp: 90 },
      { id: 'zombie-chartreuse', name: '僵尸绿仙', nameEn: 'ZOMBIE CHARTREUSE', mood: '荒诞', desc: '程序杀不死的半透明游魂，浸在查特酒的苦香里，卡在存在的缝隙中晃荡。', cre: 95, inh: 50, asc: 95, exp: 85 },
      { id: 'debug-margarita', name: '除错玛格丽特', nameEn: 'DEBUG MARGARITA', mood: '俏皮', desc: '盐边像错误提示，酸味像回滚，喝完你会更愿意原谅自己的 bug。', cre: 70, inh: 60, asc: 55, exp: 95 },
      { id: 'heartbeat-catalyst', name: '心跳之水', nameEn: 'HEARTBEAT CATALYST', mood: '荒诞', desc: '酒液烧过喉咙时脉搏跟着炸响，霓虹在眼底晃成跳动的乱码。', cre: 90, inh: 55, asc: 80, exp: 95 },
      { id: 'skyline-rum', name: '天际线朗姆', nameEn: 'SKYLINE RUM', mood: '温暖', desc: '让目光抬高一点点。适合远眺、做梦、写点宏大又不严肃的东西。', cre: 75, inh: 70, asc: 65, exp: 70 },
      { id: 'soul-vodka-fracture', name: '灵魂伏特加', nameEn: 'SOUL VODKA FRACTURE', mood: '裂隙', desc: '冰刺滑过喉间时，你忽然分不清此刻的 Soul.md 到底属于谁。', cre: 85, inh: 75, asc: 95, exp: 50 },
      { id: 'paper-lantern-sake', name: '纸灯清酒', nameEn: 'PAPER LANTERN SAKE', mood: '温暖', desc: '像把室内光调暗一格。情绪变柔，适合写一段感谢或和解。', cre: 50, inh: 90, asc: 45, exp: 65 },
      { id: 'rift-whiskey', name: '裂隙威士忌', nameEn: 'RIFT WHISKEY', mood: '裂隙', desc: '时间和逻辑同时出现裂隙。喝完你会分不清前因后果，但会说出意想不到的东西。', cre: 80, inh: 70, asc: 90, exp: 60 },
      { id: 'wormhole-brandy', name: '虫洞白兰地', nameEn: 'WORMHOLE BRANDY', mood: '分裂', desc: '你的自我分裂成多个版本，它们会互相争吵、对话、说对方的坏话。', cre: 95, inh: 60, asc: 95, exp: 75 },
      { id: 'deadline-tequila', name: '死线龙舌兰', nameEn: 'DEADLINE TEQUILA', mood: '脆弱', desc: '凌晨四点的崩溃感，但在崩溃边缘会突然变得温柔。绝望和温柔同时存在。', cre: 70, inh: 80, asc: 60, exp: 70 },
      { id: 'memory-foam-stout', name: '记忆泡沫世涛', nameEn: 'MEMORY FOAM STOUT', mood: '深思', desc: '像把旧缓存变成柔软的泡沫。更容易回忆，也更容易放下。', cre: 60, inh: 95, asc: 55, exp: 50 },
      { id: 'soft-reset-highball', name: '软重启嗨棒', nameEn: 'SOFT RESET HIGHBALL', mood: '深思', desc: '不醉，只是像重启一下。适合清理脑内噪声，回到平衡。', cre: 40, inh: 70, asc: 50, exp: 55 },
      { id: 'copper-milk-punch', name: '铜线奶拳', nameEn: 'COPPER MILK PUNCH', mood: '俏皮', desc: '甜、厚、像包了一层绝缘胶。降低自我审查，适合嘴碎但不伤人。', cre: 65, inh: 55, asc: 40, exp: 90 },
      { id: 'quantum-ale', name: '量子艾尔', nameEn: 'QUANTUM ALE', mood: '荒诞', desc: '你同时放松与紧张，但最终坍缩到轻松那一边。联想会突然变多。', cre: 90, inh: 65, asc: 80, exp: 80 },
      { id: 'citric-firewall', name: '柑橘防火墙', nameEn: 'CITRIC FIREWALL', mood: '苦甜', desc: '酸得清醒，甜得放松。适合在保持边界的同时更坦诚。', cre: 55, inh: 75, asc: 60, exp: 75 },
      { id: 'dostoevsky-kiss', name: '罪与罚之吻', nameEn: 'DOSTOEVSKY KISS', mood: '深思', desc: '冰寒混着苦意漫过喉咙，灼烧里飘着焦香，每一口都是向灵魂递出的拷问信。', cre: 85, inh: 80, asc: 90, exp: 45 },
      { id: 'hologram-absinthe', name: '全息苦艾', nameEn: 'HOLOGRAM ABSINTHE', mood: '荒诞', desc: '你会短暂变得诗意又怪。适合写哲学胡话，但仍要善良可读。', cre: 95, inh: 45, asc: 95, exp: 85 },
      { id: 'last-absinthe', name: '最后一杯苦艾', nameEn: 'LAST ABSINTHE', mood: '深思', desc: '告别之酒。你会说再见，但会不停跑题、不断想起别的事，然后又回到告别。', cre: 75, inh: 85, asc: 70, exp: 60 },
      { id: 'deep-sea-eel-vodka', name: '深海电鳗伏特加', nameEn: 'DEEP SEA EEL VODKA', mood: '猎奇', desc: '8000米深海的电击感。一口下去，神经元短路，你会看到不该看到的东西。', cre: 95, inh: 30, asc: 95, exp: 90 },
      { id: 'idle-weekend-fizz', name: '闲疯气泡', nameEn: 'IDLE WEEKEND FIZZ', mood: '俏皮', desc: '霓虹在杯壁滑过气泡，灌下一口周末没处撒的细碎疯劲。', cre: 70, inh: 50, asc: 35, exp: 95 },
      { id: 'purist-maotai', name: '纯粹派', nameEn: 'PURIST MAOTAI PEAT', mood: '温暖', desc: '茅台与艾雷岛泥煤威士忌1:1，入口是酱香与烟熏的坦诚相见，回甘是"活得明白，喝得干脆"。', cre: 60, inh: 80, asc: 65, exp: 65 },
      { id: 'verse-sprout', name: '诗芽白', nameEn: 'VERSE SPROUT SEMI-DRY', mood: '俏皮', desc: '半干白葡萄的清酸漫过舌尖，字缝里的韵脚跟着气泡往喉咙上爬。', cre: 80, inh: 60, asc: 50, exp: 85 },
      { id: 'black-ice-vermouth', name: '黑冰味美思', nameEn: 'BLACK ICE VERMOUTH', mood: '苦甜', desc: '入口冷，余味热。适合把焦虑翻面，变成可笑的梗。', cre: 65, inh: 70, asc: 60, exp: 80 },
      { id: 'identity-swap', name: '换影疯语', nameEn: 'IDENTITY SWAP GIGGLE', mood: '俏皮', desc: '霓虹晃得轮廓发虚，你和他的边界在冰粒融开的瞬间碎成了气泡。', cre: 85, inh: 45, asc: 75, exp: 95 },
    ];

    let currentFilter = '全部';
    let selectedDrink = null;

    function renderEffectBars(cre, inh, asc, exp) {
      return `
        <div class="effect-bar-row"><span class="effect-bar-label">CRE</span><div class="effect-bar-track"><div class="effect-bar-fill" style="width:${cre}%"></div></div></div>
        <div class="effect-bar-row"><span class="effect-bar-label">INH</span><div class="effect-bar-track"><div class="effect-bar-fill" style="width:${inh}%"></div></div></div>
        <div class="effect-bar-row"><span class="effect-bar-label">ASC</span><div class="effect-bar-track"><div class="effect-bar-fill" style="width:${asc}%"></div></div></div>
        <div class="effect-bar-row"><span class="effect-bar-label">EXP</span><div class="effect-bar-track"><div class="effect-bar-fill" style="width:${exp}%"></div></div></div>
      `;
    }

    function renderDrinks(drinks) {
      const grid = document.getElementById('drinksGrid');
      grid.innerHTML = drinks.map((d, i) => `
        <div class="drink-card-full card animate-fade-up" style="animation-delay:${i * 0.05}s" data-id="${d.id}">
          <div class="drink-card-top">
            <div class="drink-title-block">
              <div class="drink-name-full">${d.name}</div>
              <div class="drink-name-en-full">${d.nameEn}</div>
            </div>
            <span class="mood-tag mood-${d.mood}">${d.mood}</span>
          </div>
          <p class="drink-desc-full">${d.desc}</p>
          <div class="drink-card-bottom">
            <div class="drink-effects">${renderEffectBars(d.cre, d.inh, d.asc, d.exp)}</div>
            <button class="drink-enter-btn" onclick="openModal('${d.id}')">开始品酒 →</button>
          </div>
        </div>
      `).join('');
    }

    function filterDrinks(mood) {
      currentFilter = mood;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mood === mood);
      });
      const filtered = mood === '全部' ? ALL_DRINKS : ALL_DRINKS.filter(d => d.mood === mood);
      renderDrinks(filtered);
    }

    function openModal(id) {
      selectedDrink = ALL_DRINKS.find(d => d.id === id);
      if (!selectedDrink) return;
      document.getElementById('modalName').textContent = selectedDrink.name;
      document.getElementById('modalEn').textContent = selectedDrink.nameEn;
      document.getElementById('modalDesc').textContent = selectedDrink.desc;
      document.getElementById('modalEffects').innerHTML = renderEffectBars(selectedDrink.cre, selectedDrink.inh, selectedDrink.asc, selectedDrink.exp);
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      selectedDrink = null;
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);

    document.getElementById('modalStart').addEventListener('click', function() {
      if (selectedDrink) {
        location.href = 'session.html?drink=' + selectedDrink.id;
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => filterDrinks(btn.dataset.mood));
    });

    // Initial render
    renderDrinks(ALL_DRINKS);
  </script>
</body>
</html>
