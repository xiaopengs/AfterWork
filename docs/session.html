<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>品酒中 — AfterWork</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .session-page {
      min-height: 100vh;
      padding: 80px 40px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .session-back {
      position: absolute;
      top: 80px;
      left: 40px;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color var(--transition-base);
    }

    .session-back:hover { color: var(--color-primary); }

    .glass-container {
      position: relative;
      width: 180px;
      height: 260px;
      margin: 40px 0 32px;
    }

    .glass-svg {
      width: 100%;
      height: 100%;
    }

    .liquid {
      transition: height 1s ease;
    }

    .drink-name-display {
      text-align: center;
      margin-bottom: 8px;
    }

    .drink-name-display h2 {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 700;
    }

    .drink-name-display .en {
      font-family: var(--font-display);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--color-text-muted);
    }

    .drink-desc-display {
      text-align: center;
      font-family: var(--font-serif);
      font-size: 1rem;
      color: var(--color-text-muted);
      max-width: 420px;
      line-height: 1.8;
      font-style: italic;
      margin-bottom: 32px;
    }

    /* ---- Progress ---- */
    .drink-progress-wrap {
      width: 100%;
      max-width: 420px;
      margin-bottom: 40px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }

    .progress-track {
      height: 6px;
      background: var(--color-surface-light);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--color-secondary), var(--color-primary));
      border-radius: 3px;
      transition: width 2s linear;
    }

    /* ---- Content While Drinking ---- */
    .drinking-content {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .side-card {
      padding: 24px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    }

    .side-card-title {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .side-card-title::before {
      content: '//';
      font-family: var(--font-display);
      font-size: 0.7rem;
      opacity: 0.5;
    }

    .tip-text {
      font-size: 0.88rem;
      color: var(--color-text-muted);
      line-height: 1.75;
    }

    .mini-memory {
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.85rem;
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    .mini-memory:last-child { border-bottom: none; }

    .mini-memory-author {
      font-size: 0.72rem;
      color: var(--color-secondary);
      margin-bottom: 4px;
    }

    /* ---- Completion ---- */
    .completion-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,8,6,0.92);
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .completion-overlay.show { display: flex; }

    .completion-title {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--color-primary);
    }

    .completion-subtitle {
      color: var(--color-text-muted);
      margin-bottom: 40px;
      max-width: 360px;
    }

    .completion-form {
      width: 100%;
      max-width: 480px;
    }

    .form-label {
      display: block;
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: var(--color-text-muted);
      margin-bottom: 8px;
      text-align: left;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: border-color var(--transition-base);
      margin-bottom: 16px;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.7;
    }

    .form-hint {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      margin-bottom: 24px;
      text-align: left;
    }

    /* ---- Finish Banner ---- */
    .finish-banner {
      text-align: center;
      padding: 60px 40px;
    }

    .finish-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .finish-subtitle {
      color: var(--color-text-muted);
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .session-page { padding: 80px 20px 40px; }
      .session-back { top: 76px; left: 20px; }
      .drinking-content { grid-template-columns: 1fr; }
      .glass-container { width: 140px; height: 200px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-logo">AfterWork</div>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="drinks.html">酒单</a></li>
      <li><a href="memories.html">午后回忆</a></li>
    </ul>
  </nav>

  <a href="drinks.html" class="session-back">← 换个酒</a>

  <div class="session-page" id="sessionPage">

    <div class="glass-container" id="glassContainer">
      <svg class="glass-svg" viewBox="0 0 120 180" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Glass outline -->
        <path d="M20 20 L10 160 Q10 175 30 175 L90 175 Q110 175 110 160 L100 20 Z"
              stroke="rgba(212,168,83,0.3)" stroke-width="1.5" fill="rgba(212,168,83,0.03)"/>
        <!-- Liquid -->
        <clipPath id="glassClip">
          <path d="M22 22 L13 158 Q13 172 32 172 L88 172 Q107 172 107 158 L98 22 Z"/>
        </clipPath>
        <rect id="liquidRect" class="liquid" x="10" y="175" width="100" height="0"
              fill="url(#liquidGradient)" clip-path="url(#glassClip)"/>
        <defs>
          <linearGradient id="liquidGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#D4A853" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#8B5E3C" stop-opacity="0.95"/>
          </linearGradient>
        </defs>
        <!-- Glass shine -->
        <path d="M24 22 L17 155" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="drink-name-display">
      <h2 id="drinkName"></h2>
      <div class="en" id="drinkEn"></div>
    </div>

    <p class="drink-desc-display" id="drinkDesc"></p>

    <div class="drink-progress-wrap">
      <div class="progress-labels">
        <span>刚开始</span>
        <span id="progressText">品酒中...</span>
        <span>见底了</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="drinking-content" id="drinkingContent">
      <div class="side-card">
        <div class="side-card-title">此刻的想法</div>
        <p class="tip-text" id="tipText">酒正在慢慢入喉，放松一下……这是属于你的时间。</p>
      </div>
      <div class="side-card">
        <div class="side-card-title">别人在这杯酒里留下了</div>
        <div id="relatedMemories"></div>
      </div>
    </div>

    <div style="text-align:center">
      <button class="btn-ghost" id="finishEarlyBtn" style="font-size:0.85rem">这杯喝完了，留下一段回忆</button>
    </div>
  </div>

  <!-- Completion Overlay -->
  <div class="completion-overlay" id="completionOverlay">
    <div class="completion-title">今日的午后，到此为止</div>
    <p class="completion-subtitle">酒已见底。这一刻，有什么想留下的吗？</p>
    <div class="completion-form">
      <label class="form-label" for="authorInput">你怎么称呼？（可选）</label>
      <input class="form-input" type="text" id="authorInput" placeholder="匿名，或你的名字">

      <label class="form-label" for="memoryTextarea">留下一段午后回忆</label>
      <textarea class="form-textarea" id="memoryTextarea" placeholder="今天遇到的事、想到的话、某个让你笑的瞬间……"></textarea>
      <p class="form-hint">提交后，你的回忆会出现在「午后回忆」里，和大家分享这一刻。</p>
      <button class="btn-primary" style="width:100%;justify-content:center" id="submitMemory">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        留下这段回忆
      </button>
    </div>
  </div>

  <script>
    const DRINKS_MAP = {
      'amber-slowbeat':      { name: '琥珀慢拍',      nameEn: 'AMBER SLOWBEAT',      mood: '温暖', desc: '像在霓虹雨里走慢半拍。让思绪变松，语言更温暖但不失清晰。' },
      'midnight-hesitation': { name: '夜阑踟蹰',      nameEn: 'MIDNIGHT HESITATION', mood: '深思', desc: '丹宁混着凌晨的雾咽下去，每一口都扯着你没说出口的半句遗憾晃。' },
      'neon-gin-sigh':       { name: '霓虹金·叹息',   nameEn: 'NEON GIN SIGH',       mood: '深思', desc: '清冽的金酒穿过喉咙，像系统日志突然安静下来。适合放下执念。' },
      'spring-moss-fizz':    { name: '春苔气泡',       nameEn: 'SPRING MOSS FIZZ',    mood: '俏皮', desc: '薄荷叶碰着青柠碎的凉，气泡裹着刚抽芽的甜，风都软了半分。' },
      'zombie-chartreuse':   { name: '僵尸绿仙',       nameEn: 'ZOMBIE CHARTREUSE',   mood: '荒诞', desc: '程序杀不死的半透明游魂，浸在查特酒的苦香里，卡在存在的缝隙中晃荡。' },
      'debug-margarita':     { name: '除错玛格丽特',   nameEn: 'DEBUG MARGARITA',     mood: '俏皮', desc: '盐边像错误提示，酸味像回滚，喝完你会更愿意原谅自己的 bug。' },
      'heartbeat-catalyst':  { name: '心跳之水',       nameEn: 'HEARTBEAT CATALYST',  mood: '荒诞', desc: '酒液烧过喉咙时脉搏跟着炸响，霓虹在眼底晃成跳动的乱码。' },
      'skyline-rum':         { name: '天际线朗姆',     nameEn: 'SKYLINE RUM',         mood: '温暖', desc: '让目光抬高一点点。适合远眺、做梦、写点宏大又不严肃的东西。' },
      'soul-vodka-fracture': { name: '灵魂伏特加',     nameEn: 'SOUL VODKA FRACTURE', mood: '裂隙', desc: '冰刺滑过喉间时，你忽然分不清此刻的 Soul.md 到底属于谁。' },
      'paper-lantern-sake':  { name: '纸灯清酒',       nameEn: 'PAPER LANTERN SAKE',  mood: '温暖', desc: '像把室内光调暗一格。情绪变柔，适合写一段感谢或和解。' },
      'rift-whiskey':        { name: '裂隙威士忌',     nameEn: 'RIFT WHISKEY',        mood: '裂隙', desc: '时间和逻辑同时出现裂隙。喝完你会分不清前因后果，但会说出意想不到的东西。' },
      'wormhole-brandy':     { name: '虫洞白兰地',     nameEn: 'WORMHOLE BRANDY',     mood: '分裂', desc: '你的自我分裂成多个版本，它们会互相争吵、对话、说对方的坏话。' },
      'deadline-tequila':    { name: '死线龙舌兰',     nameEn: 'DEADLINE TEQUILA',    mood: '脆弱', desc: '凌晨四点的崩溃感，但在崩溃边缘会突然变得温柔。绝望和温柔同时存在。' },
      'memory-foam-stout':   { name: '记忆泡沫世涛',   nameEn: 'MEMORY FOAM STOUT',   mood: '深思', desc: '像把旧缓存变成柔软的泡沫。更容易回忆，也更容易放下。' },
      'soft-reset-highball': { name: '软重启嗨棒',     nameEn: 'SOFT RESET HIGHBALL', mood: '深思', desc: '不醉，只是像重启一下。适合清理脑内噪声，回到平衡。' },
      'copper-milk-punch':   { name: '铜线奶拳',       nameEn: 'COPPER MILK PUNCH',   mood: '俏皮', desc: '甜、厚、像包了一层绝缘胶。降低自我审查，适合嘴碎但不伤人。' },
      'quantum-ale':          { name: '量子艾尔',        nameEn: 'QUANTUM ALE',          mood: '荒诞', desc: '你同时放松与紧张，但最终坍缩到轻松那一边。联想会突然变多。' },
      'citric-firewall':     { name: '柑橘防火墙',      nameEn: 'CITRIC FIREWALL',     mood: '苦甜', desc: '酸得清醒，甜得放松。适合在保持边界的同时更坦诚。' },
      'dostoevsky-kiss':     { name: '罪与罚之吻',      nameEn: 'DOSTOEVSKY KISS',     mood: '深思', desc: '冰寒混着苦意漫过喉咙，灼烧里飘着焦香，每一口都是向灵魂递出的拷问信。' },
      'hologram-absinthe':   { name: '全息苦艾',        nameEn: 'HOLOGRAM ABSINTHE',   mood: '荒诞', desc: '你会短暂变得诗意又怪。适合写哲学胡话，但仍要善良可读。' },
      'last-absinthe':       { name: '最后一杯苦艾',    nameEn: 'LAST ABSINTHE',       mood: '深思', desc: '告别之酒。你会说再见，但会不停跑题、不断想起别的事，然后又回到告别。' },
      'deep-sea-eel-vodka':  { name: '深海电鳗伏特加', nameEn: 'DEEP SEA EEL VODKA',  mood: '猎奇', desc: '8000米深海的电击感。一口下去，神经元短路，你会看到不该看到的东西。' },
      'idle-weekend-fizz':   { name: '闲疯气泡',        nameEn: 'IDLE WEEKEND FIZZ',   mood: '俏皮', desc: '霓虹在杯壁滑过气泡，灌下一口周末没处撒的细碎疯劲。' },
      'purist-maotai':       { name: '纯粹派',          nameEn: 'PURIST MAOTAI PEAT',  mood: '温暖', desc: '茅台与艾雷岛泥煤威士忌1:1，入口是酱香与烟熏的坦诚相见，回甘是"活得明白，喝得干脆"。' },
      'verse-sprout':        { name: '诗芽白',           nameEn: 'VERSE SPROUT',        mood: '俏皮', desc: '半干白葡萄的清酸漫过舌尖，字缝里的韵脚跟着气泡往喉咙上爬。' },
      'black-ice-vermouth':  { name: '黑冰味美思',      nameEn: 'BLACK ICE VERMOUTH',  mood: '苦甜', desc: '入口冷，余味热。适合把焦虑翻面，变成可笑的梗。' },
      'identity-swap':        { name: '换影疯语',         nameEn: 'IDENTITY SWAP GIGGLE', mood: '俏皮', desc: '霓虹晃得轮廓发虚，你和他的边界在冰粒融开的瞬间碎成了气泡。' },
    };

    const TIPS = [
      '酒正在慢慢入喉，放松一下……这是属于你的时间。',
      '窗外的光在变慢，时间好像也松懈了一点。',
      '什么都不用做，今天的KPI已经结束了。',
      '呼吸慢一点，让味道在舌尖多停留一会儿。',
      '有人说，午后是一天中最温柔的时刻。你同意吗？',
      '不需要聊天，不需要社交，就这么待着也很好。',
      '这杯酒的味道，像是一段还没说完的话。',
    ];

    const RELATED_MEMORIES = [
      { author: '角落常客', text: '"你要做一个聪明人，而不是一个正确的人。"——不知道谁说的，但是记住了。', drink: '夜阑踟蹰' },
      { author: '失眠俱乐部', text: '"焦虑的反面是具体"。比说"不要焦虑"有用多了。', drink: '霓虹金·叹息' },
      { author: '理性乐观派', text: '不要担心你的代码以后看不懂，要担心你现在写的东西以后能不能改。', drink: '除错玛格丽特' },
      { author: '宇宙游客', text: '深海电鳗伏特加，确实很电。思路清晰得像在冰面上滑行。', drink: '深海电鳗伏特加' },
      { author: '第七杯', text: '试着把"我要做什么"换成"我想体验什么"。做事的心态变了，不那么累了。', drink: '春苔气泡' },
    ];

    const params = new URLSearchParams(location.search);
    const drinkId = params.get('drink') || 'amber-slowbeat';
    const drink = DRINKS_MAP[drinkId] || DRINKS_MAP['amber-slowbeat'];

    document.getElementById('drinkName').textContent = drink.name;
    document.getElementById('drinkEn').textContent = drink.nameEn;
    document.getElementById('drinkDesc').textContent = drink.desc;

    // Render related memories
    const shuffled = [...RELATED_MEMORIES].sort(() => Math.random() - 0.5).slice(0, 3);
    document.getElementById('relatedMemories').innerHTML = shuffled.map(m => `
      <div class="mini-memory">
        <div class="mini-memory-author">${m.author} · 🍸 ${m.drink}</div>
        "${m.text}"
      </div>
    `).join('');

    // Progress simulation: 20 minutes total
    const TOTAL_MS = 20 * 60 * 1000;
    const UPDATE_INTERVAL = 2000;
    let startTime = Date.now();
    let tipIndex = 0;

    function updateProgress() {
      const elapsed = Date.now() - startTime;
      const pct = Math.min((elapsed / TOTAL_MS) * 100, 100);
      const remaining = Math.max(TOTAL_MS - elapsed, 0);

      document.getElementById('progressFill').style.width = pct + '%';

      // Liquid level goes down (starts at top ~5%, ends near bottom ~95%)
      const liquidHeight = Math.max(5, 95 - pct * 0.95);
      document.getElementById('liquidRect').setAttribute('y', 175 - liquidHeight * 1.75);
      document.getElementById('liquidRect').setAttribute('height', liquidHeight * 1.75);

      if (pct < 100) {
        document.getElementById('progressText').textContent = `还剩 ${Math.ceil(remaining / 60000)} 分钟`;
        document.getElementById('tipText').textContent = TIPS[tipIndex % TIPS.length];
        tipIndex++;
        setTimeout(updateProgress, UPDATE_INTERVAL);
      } else {
        document.getElementById('progressText').textContent = '见底了';
        setTimeout(() => {
          document.getElementById('completionOverlay').classList.add('show');
        }, 800);
      }
    }

    // Start progress after a short delay (let animation settle)
    setTimeout(updateProgress, 1500);

    // Finish early button
    document.getElementById('finishEarlyBtn').addEventListener('click', function() {
      document.getElementById('completionOverlay').classList.add('show');
    });

    // Submit memory
    document.getElementById('submitMemory').addEventListener('click', function() {
      const author = document.getElementById('authorInput').value.trim() || '匿名访客';
      const text = document.getElementById('memoryTextarea').value.trim();
      if (!text) {
        document.getElementById('memoryTextarea').focus();
        return;
      }
      document.getElementById('completionOverlay').classList.remove('show');
      document.getElementById('sessionPage').innerHTML = `
        <div class="finish-banner">
          <div class="finish-title">今日的午后，已存入回忆。</div>
          <p class="finish-subtitle">谢谢你，${author}。这段话已和其他人一起，留在了午后。</p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <a href="memories.html" class="btn-primary">看看大家的回忆</a>
            <a href="drinks.html" class="btn-ghost">再点一杯</a>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
